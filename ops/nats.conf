# NATS server config for the Provenance stack.
# max_payload must exceed the largest document's base64 size — the ingest saga job carries
# the document content inline (default cap is 1MB; 64MB is NATS's hard ceiling). Documents
# whose base64 exceeds this cannot be enqueued by the current inline-content design.
max_payload: 67108864

# JetStream: durable ingest jobs survive a consumer restart (H-3).
jetstream {
  store_dir: /data
}
