# OpenTelemetry Collector — receives OTLP traces from every service and prints them,
# so we can verify that one trace spans all hops (P0 gate, R56).
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch: {}

exporters:
  debug:
    # `normal`, not `detailed`: detailed dumps all span attributes to the collector logs, which
    # would print ingested document content once spans carry chunk text (review L-12).
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
