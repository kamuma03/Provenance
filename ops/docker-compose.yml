# Provenance — P0 walking skeleton.
# 8 services + NATS + Postgres + OpenTelemetry collector. `docker compose up`.
name: provenance

x-service-base: &service-base
  build:
    context: ..
    dockerfile: Dockerfile
  # Reach the host's Ollama (already serving the tier models) from inside the containers.
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment: &service-env
    NATS_URL: nats://nats:4222
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    OTEL_SERVICE_NAMESPACE: provenance
    # Sandbox/compose: deterministic embedder + lexical reranker (no model downloads).
    # Unset on the DGX Spark to use the real fastembed models.
    PROVENANCE_OFFLINE: ${PROVENANCE_OFFLINE-1}
    # ---- ONNX model selection (R66/R24) ----
    # The embedder + reranker models, sourced from .env so it's the single source of truth.
    # Defaults match .env; overridden per env. Only used when PROVENANCE_OFFLINE is unset.
    EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
    RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
    # ---- LLM routing (A2) ----
    # Two local tiers defined once; tasks route to high/low (see packages/service llm.py).
    # Flip a task to anthropic:... to A/B against Claude; keep EVAL_JUDGE on Claude as the
    # trusted ruler while measuring local generators.
    LLM_LOCAL_BASE_URL: ${LLM_LOCAL_BASE_URL-http://ollama:11434/v1}  # empty ⇒ heuristic (no local server)
    LLM_TIER_HIGH: local:qwen3.6:27b      # capable model: synthesis + critique
    LLM_TIER_LOW: local:qwen3.5:9b        # fast model: detection, planning, bulk extraction
    # vLLM serving: it 400s on Ollama's `reasoning_effort`, so disable that and switch the
    # Qwen3.5 thinking model to direct-answer mode via chat_template_kwargs instead.
    LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT-none}
    LLM_EXTRA_BODY: ${LLM_EXTRA_BODY-}
    LLM_EXTRACTION: low
    LLM_DETECTION: low
    LLM_PLANNER: low
    LLM_SYNTHESIZER: high
    LLM_CRITIC: high
    LLM_EVAL_JUDGE: ${LLM_EVAL_JUDGE:-anthropic:claude-opus-4-8}
    # ANTHROPIC_API_KEY is NOT set here — it's scoped to the two services that route tasks to
    # Claude (query-agent, extraction), not fanned out to all 8 containers (review H-13).
  depends_on:
    - nats
    - otel-collector
  restart: unless-stopped

services:
  # ---- infrastructure ----
  # Datastores bind to loopback only (review H-13): Docker's iptables rules otherwise publish
  # them on 0.0.0.0 past the host firewall, letting any LAN machine rewrite the catalog or
  # inject ingest events. Only the Gateway is meant to face the network.
  nats:
    image: nats:2.10
    # Config file (not CLI flags): raises max_payload to 64MB because the ingest saga job
    # carries the document's base64 content inline (default cap 1MB). JetStream stays on for
    # durable ingest jobs (H-3). Docs whose base64 exceeds 64MB (NATS's ceiling) can't be
    # enqueued by this inline-content design.
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
    ports: ["127.0.0.1:4222:4222"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-provenance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}  # from .env, single source of truth
      POSTGRES_DB: ${POSTGRES_DB:-provenance}
    volumes:
      # Persist the catalog across container recreation — without this the whole catalog is
      # lost on `docker compose down/up` while kuzu_data survives (split-brain, review H-3d).
      - pg_data:/var/lib/postgresql/data
      - ./sql/catalog_init.sql:/docker-entrypoint-initdb.d/catalog_init.sql:ro
    ports: ["127.0.0.1:5432:5432"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro

  # ---- local LLM serving (Ollama; OpenAI-compatible at /v1) ----
  # On-demand multi-model load by name: the router sends per-task model names and Ollama
  # loads each, keeping both tiers warm (128GB unified memory on the Spark fits both).
  ollama:
    image: ollama/ollama:0.5.7           # pinned, not :latest, so rebuilds are reproducible
    profiles: ["llm"]                    # opt-in: started by scripts/start.sh (or --profile llm)
    volumes:
      - ollama_data:/root/.ollama
    ports: ["127.0.0.1:11434:11434"]
    # GPU passthrough (needs nvidia-container-toolkit on the host; ignored on CPU-only).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # One-shot: pull the two tier models into the shared volume, then exit.
  ollama-pull:
    image: ollama/ollama:0.5.7          # pinned to match the ollama service
    profiles: ["llm-pull"]              # separate profile so start.sh --no-pull can skip it
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull qwen3.6:27b && ollama pull qwen3.5:9b"]
    restart: "no"

  # ---- application services (8) ----
  gateway:
    <<: *service-base
    command: ["uvicorn", "provenance_services.gateway:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      <<: *service-env
      service_name: gateway
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-provenance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-provenance}
      QUERY_URL: http://query-agent:8000
    ports: ["8000:8000"]
    depends_on:
      - nats
      - postgres
      - otel-collector
      - query-agent

  ingestion:
    <<: *service-base
    command: ["uvicorn", "provenance_services.ingestion:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      <<: *service-env
      service_name: ingestion
      # vLLM continuous batching scales with concurrency, so feed it many parallel window
      # calls (Ollama was serial and capped at ~3). Combined with the driver's per-doc
      # concurrency this saturates vLLM's batch (peak ~304 tok/s vs Ollama's flat 33).
      EXTRACT_WINDOW_CHARS: "8000"
      EXTRACT_CONCURRENCY: "16"
      # Large (170+ page) OCR-heavy 10-Ks take >180s to parse; raise the inter-service call
      # ceiling so parse/extraction don't ReadTimeout on them.
      SERVICE_CALL_TIMEOUT_S: "600"
      # Concurrent in-flight sagas. Tune to keep vLLM's batch fed without overwhelming the
      # service (each saga also runs CPU-heavy OCR). Overridable for throughput tuning.
      INGEST_MAX_ACK_PENDING: ${INGEST_MAX_ACK_PENDING-4}

  parse:
    <<: *service-base
    command: ["uvicorn", "provenance_services.parse:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: { <<: *service-env, service_name: parse }

  extraction:
    <<: *service-base
    command: ["uvicorn", "provenance_services.extraction:app", "--host", "0.0.0.0", "--port", "8000"]
    # Claude-routing service → gets the API key (scoped, not fanned out to all 8 — H-13).
    environment:
      <<: *service-env
      service_name: extraction
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  vector:
    <<: *service-base
    command: ["uvicorn", "provenance_services.vector:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: { <<: *service-env, service_name: vector }

  graph:
    <<: *service-base
    command: ["uvicorn", "provenance_services.graph:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: { <<: *service-env, service_name: graph, KUZU_DB_PATH: /data/kuzu }
    volumes:
      - kuzu_data:/data

  model:
    <<: *service-base
    command: ["uvicorn", "provenance_services.model:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: { <<: *service-env, service_name: model }

  query-agent:
    <<: *service-base
    command: ["uvicorn", "provenance_services.query_agent:app", "--host", "0.0.0.0", "--port", "8000"]
    # Hosts the agent crew (synthesizer/critic can route to Claude) → scoped API key (H-13).
    environment:
      <<: *service-env
      service_name: query-agent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  # ---- web UI ----
  # Part of the "as an end user runs it" stack (review M-17), not a manual `next dev`. The
  # browser reaches the Gateway at the host-published http://localhost:8000 (default), so no
  # build arg is needed. Served on http://localhost:3000.
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    depends_on:
      - gateway
    restart: unless-stopped

# NOTE (non-root upgrade, H-13): the app image now runs as a non-root user (uid 10001) and
# the Kuzu volume (kuzu_data → /data) is written by it. Docker copies the image's /data
# ownership onto a FRESH volume, so clean deploys just work. But a volume created by an OLDER
# root-built image stays root-owned, and the graph service then hits "Permission denied" on
# /data/kuzu. When upgrading such a deployment, recreate the volume once:
#   docker compose down && docker volume rm provenance_kuzu_data && docker compose up -d
# (or `chown -R 10001 <volume mountpoint>`). Verified end-to-end on the DGX Spark.
volumes:
  kuzu_data:
  ollama_data:
  pg_data:
