[project]
name = "provenance-contracts"
version = "0.1.0"
description = "Shared, versioned contracts: domain model, ports, agent messages, domain registry"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/provenance_contracts"]
