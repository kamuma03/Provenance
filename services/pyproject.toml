[project]
name = "provenance-services"
version = "0.1.0"
description = "Provenance microservices (P0 walking skeleton)"
requires-python = ">=3.11"
dependencies = [
    "provenance-contracts",
    "provenance-service",
    "asyncpg>=0.29",
    "pdfplumber>=0.11",  # digital-first PDF parsing (MIT/pdfminer.six) — R61
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/provenance_services"]
