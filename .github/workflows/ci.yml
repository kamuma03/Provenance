name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install workspace
        run: |
          uv venv
          uv pip install -e packages/contracts -e packages/service -e services
          uv pip install ruff mypy pytest pytest-asyncio

      - name: Lint (ruff)
        run: uv run ruff check packages services scripts

      - name: Type-check (mypy)
        run: uv run mypy packages/contracts/src packages/service/src

      - name: Unit tests (contracts)
        run: uv run pytest packages -q

      - name: License audit (R59 — fail on non-permissive deps)
        run: uv run python scripts/license_audit.py
