name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install workspace
        run: |
          uv venv
          uv pip install -e packages/contracts -e packages/service -e services -e eval
          uv pip install ruff mypy pytest pytest-asyncio reportlab

      - name: Lint (ruff)
        run: uv run ruff check packages services eval scripts

      - name: Type-check (mypy)
        run: uv run mypy packages/contracts/src packages/service/src services/src

      - name: Unit tests
        run: uv run pytest packages services eval -q

      - name: License audit (R59 — fail on non-permissive deps)
        run: uv run python scripts/license_audit.py

      - name: Contract types up to date (N9 — web TS generated from Pydantic contracts)
        run: uv run python scripts/gen_ts_contracts.py --check

      - name: Requirements lock up to date (H-13 — image installs match uv.lock)
        run: |
          uv export --package provenance-services --frozen --no-dev \
            --no-emit-workspace --no-hashes -o ops/requirements.lock.txt
          git diff --exit-code ops/requirements.lock.txt

      - name: Eval gate (R44 — fail below §9.2 thresholds; LLM metrics run on the Spark)
        run: PROVENANCE_OFFLINE=1 uv run python -m provenance_eval.gate

  # The UI was previously untested in CI (review H-13): no lint/type/build/audit ran.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install (locked)
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Build (next)
        run: npm run build

      - name: Audit (fail on critical)
        run: npm audit --audit-level=critical
