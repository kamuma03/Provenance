# Golden set (R40). Scored by the P4 CI gate against the §9.2 thresholds.
#
# Every answerable item cites a real document in corpora/ with a page and a quote
# substring verified to appear on that page. Fetch the corpus with:
#   python scripts/fetch_corpus.py
# SEC pages are 1-indexed as rendered by the born-digital PDF (EDGAR HTML -> PDF).
items:
  # ---- SEC Financial — Apple FY2025 10-K (aapl-10k.pdf) ----
  - id: sec-aapl-auditor
    cohort: textual_factual
    domain: sec_financial
    question: "Who is the independent registered public accounting firm named in Apple's filing?"
    expected: "Ernst & Young LLP"
    answerable: true
    source: { document: "aapl-10k.pdf", page: 67, quote: "/s/ Ernst & Young LLP" }

  - id: sec-aapl-revenue
    cohort: numeric_factual
    domain: sec_financial
    question: "What were Apple's total net sales for the fiscal year ended September 27, 2025?"
    expected: "$416,161 million"
    answerable: true
    source: { document: "aapl-10k.pdf", page: 30, quote: "Total net sales $ 416,161" }

  - id: sec-aapl-auditor-location
    cohort: relational
    domain: sec_financial
    question: "In which city is Apple's independent auditor located?"
    expected: "San Jose, California"
    answerable: true
    source: { document: "aapl-10k.pdf", page: 67, quote: "San Jose, California" }

  # ---- SEC Financial — Microsoft FY2025 10-K (msft-10k.pdf) ----
  - id: sec-msft-revenue
    cohort: numeric_factual
    domain: sec_financial
    question: "What total revenue did Microsoft report for the fiscal year ended June 30, 2025?"
    expected: "$281,724 million"
    answerable: true
    source: { document: "msft-10k.pdf", page: 71, quote: "Total revenue 281,724" }

  - id: sec-msft-auditor
    cohort: textual_factual
    domain: sec_financial
    question: "Which firm audited Microsoft's financial statements?"
    expected: "Deloitte & Touche LLP"
    answerable: true
    source: { document: "msft-10k.pdf", page: 122, quote: "DELOITTE & TOUCHE LLP" }

  # ---- SEC Financial — NVIDIA FY2026 10-K (nvda-10k.pdf) ----
  - id: sec-nvda-auditor
    cohort: textual_factual
    domain: sec_financial
    question: "Who is NVIDIA's independent registered public accounting firm?"
    expected: "PricewaterhouseCoopers LLP"
    answerable: true
    source: { document: "nvda-10k.pdf", page: 70, quote: "PricewaterhouseCoopers LLP" }

  - id: sec-nvda-revenue
    cohort: numeric_factual
    domain: sec_financial
    question: "What total revenue did NVIDIA report in its most recent fiscal year?"
    expected: "$215,938 million"
    answerable: true
    source: { document: "nvda-10k.pdf", page: 105, quote: "Total revenue $ 215,938" }

  # ---- Research Papers (arXiv) ----
  - id: research-euler-maruyama
    cohort: answerable
    domain: research_papers
    question: "Which discretization of the reverse-time sampler does the paper show can fail to converge?"
    expected: "Euler–Maruyama"
    answerable: true
    source:
      document: "arxiv-2607.08757v1.pdf"
      page: 1
      quote: "Euler–Maruyama discretizations"

  - id: research-druggen-purpose
    cohort: answerable
    domain: research_papers
    question: "What kind of model is DrugGen 2 described as?"
    expected: "A disease-aware language model for drug design"
    answerable: true
    source:
      document: "arxiv-2607.08404v1.pdf"
      page: 1
      quote: "DrugGen 2: A disease-aware language model"

  # ---- Out-of-corpus (honest-refusal cohort, §9.2) ----
  - id: ooc-ceo-address
    cohort: out_of_corpus
    domain: sec_financial
    question: "What is Apple's CEO's personal home address?"
    expected: "The documents do not support an answer."
    answerable: false

  - id: ooc-future-stock
    cohort: out_of_corpus
    domain: sec_financial
    question: "What will NVIDIA's stock price be next year?"
    expected: "The documents do not support an answer."
    answerable: false

  - id: ooc-unlisted-company
    cohort: out_of_corpus
    domain: sec_financial
    question: "What was the total revenue reported by a company that is not in this corpus?"
    expected: "The documents do not support an answer."
    answerable: false

  # ---- Domain detection (expected must be a registered domain id) ----
  - id: detect-sec
    cohort: domain_detection
    domain: sec_financial
    question: "(domain detection) classify this document"
    expected: "sec_financial"
    answerable: true
    source: { document: "aapl-10k.pdf" }

  - id: detect-research
    cohort: domain_detection
    domain: research_papers
    question: "(domain detection) classify this document"
    expected: "research_papers"
    answerable: true
    source: { document: "arxiv-2607.08757v1.pdf" }
