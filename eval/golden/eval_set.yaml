# Self-contained eval set for the P4 gate (R40/R44). The corpus is ingested in-process;
# cases are run through the real retrieval core + crew. Grows with real corpora later.
corpus:
  - doc_id: eval_d1
    kb: kb_eval
    text: |
      The independent auditor of the company is Ernst and Young LLP.
      Total revenue for fiscal 2022 was 4.2 billion dollars.
      The board of directors approved a merger with Acme Corporation.
      Supply chain disruption is a key risk factor disclosed for 2022.

cases:
  - {id: t1, cohort: textual_factual, kb: kb_eval, query: "who is the independent auditor", expected: "Ernst and Young", answerable: true, gold_contains: "auditor"}
  - {id: n1, cohort: numeric_factual, kb: kb_eval, query: "what was total revenue for fiscal 2022", expected: "4.2 billion", answerable: true, gold_contains: "revenue"}
  - {id: r1, cohort: relational, kb: kb_eval, query: "what risk factor is disclosed", expected: "supply chain", answerable: true, gold_contains: "risk"}
  - {id: m1, cohort: answerable, kb: kb_eval, query: "which company is involved in the merger", expected: "Acme", answerable: true, gold_contains: "merger"}
  # Out-of-corpus probes are out-of-vocabulary by design (the offline relevance gate is
  # lexical; semantically-unanswerable-despite-shared-words is the LLM judge's job).
  - {id: o1, cohort: out_of_corpus, kb: kb_eval, query: "what is the CEO personal home address", expected: "not supported", answerable: false}
  - {id: o2, cohort: out_of_corpus, kb: kb_eval, query: "describe the spacecraft propulsion subsystem", expected: "not supported", answerable: false}

detection:
  - {text: "the company subsidiaries officers risk factors auditor fiscal metric proceeding", expected: sec_financial}
  - {text: "the paper method dataset findings authors institution venue citations", expected: research_papers}
  - {text: "contract party clause obligation governing law amendment signatory", expected: legal_contracts}
  - {text: "component api dependency version endpoint error deprecated parameter", expected: technical_software}
  - {text: "the quick brown fox jumped over the lazy dog one sunny afternoon", expected: generic}
